<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lake Cabin</title>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Merriweather:wght@700;900&family=Lato:wght@400;700&display=swap" rel="stylesheet">
    <style>
        * { font-family: 'Lato', sans-serif; }
        h1, h2, h3 { font-family: 'Merriweather', serif; }
    </style>
    <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.js"></script>
</head>
<body>
    <div id="root"></div>
    
    <script type="text/babel">
        const { useState, useEffect } = React;

        function CabinScorer() {
          const fields = [
            { key: 'LS',   label: 'Lake Score',         type: 'number', weight: 2 },
            { key: 'ROL',  label: 'Resort on Lake',     type: 'select', weight: 1,
              options: [{label:'Yes', value:'yes', score:-2}, {label:'No', value:'no', score:2}] },
            { key: 'F',    label: 'Frontage',           type: 'feet',   weight: 1 },
            { key: 'B',    label: 'Beach',              type: 'select', weight: 2,
              options: [{label:'Sand', value:'sand', score:2}, {label:'Grass/Rock', value:'grass', score:0}, {label:'Weeds', value:'weeds', score:-1}] },
            { key: 'LB',   label: 'Lake Bottom',        type: 'select', weight: 1,
              options: [{label:'Hard', value:'hard', score:2}, {label:'Soft', value:'soft', score:-2}] },
            { key: 'SD',   label: 'Swimming Depth',     type: 'select', weight: 2,
              options: [{label:'4ft+', value:'4', score:2}, {label:'3ft', value:'3', score:0}, {label:'2ft', value:'2', score:-2}] },
            { key: 'DC',   label: 'Dock Condition',     type: 'grade',  weight: 1 },
            { key: 'DL',   label: 'Dock/Lift Included', type: 'count',  weight: 1 },
            { key: 'BS',   label: 'Backyard Slope',     type: 'select', weight: 1,
              options: [{label:'Flat/Gentle', value:'flat', score:2}, {label:'Moderate', value:'moderate', score:1}, {label:'Steep', value:'steep', score:0}, {label:'Stairs', value:'stairs', score:-1}] },
            { key: 'CC',   label: 'Cabin Condition',    type: 'grade',  weight: 2 },
            { key: 'Bdrm', label: 'Bedrooms',           type: 'select', weight: 1,
              options: [{label:'3+', value:'3', score:2}, {label:'2', value:'2', score:0}] },
            { key: 'Bthrm',label: 'Bathrooms',          type: 'select', weight: 1,
              options: [{label:'2+', value:'2', score:2}, {label:'1', value:'1', score:0}] },
            { key: 'K',    label: 'Kitchen',            type: 'grade',  weight: 1 },
            { key: 'LA',   label: 'Living Area',        type: 'grade',  weight: 1 },
            { key: 'Loft', label: 'Loft/Upstairs',      type: 'select', weight: 1,
              options: [{label:'Yes', value:'yes', score:2}, {label:'No', value:'no', score:0}] },
            { key: 'FP',   label: 'Fireplace',          type: 'select', weight: 1,
              options: [{label:'Yes', value:'yes', score:2}, {label:'No', value:'no', score:0}] },
            { key: 'SYr',  label: 'Seasonal/Year Round',type: 'select', weight: 1,
              options: [{label:'Year Round', value:'yr', score:2}, {label:'Seasonal', value:'seasonal', score:-2}] },
            { key: 'WD',   label: 'Washer/Dryer',       type: 'select', weight: 1,
              options: [{label:'Yes', value:'yes', score:2}, {label:'No', value:'no', score:0}] },
            { key: 'G',    label: 'Garage',             type: 'count',  weight: 2 },
            { key: 'OS',   label: 'Outdoor Storage',    type: 'count',  weight: 1 },
            { key: 'BLot', label: 'Backlot',            type: 'select', weight: 2,
              options: [{label:'Yes', value:'yes', score:2}, {label:'No', value:'no', score:0}] },
            { key: 'SOL',  label: 'Side of Lake',       type: 'select', weight: 1,
              options: [{label:'E', value:'e', score:2}, {label:'N/W', value:'nw', score:1}, {label:'S', value:'s', score:0}] },
            { key: 'IFT',  label: 'Incl Furn/Toys',     type: 'grade',  weight: 1 },
          ];

          const maxScore = fields.filter(f => f.type !== 'number').reduce((sum, f) => sum + 2 * f.weight, 0);

          const scoreField = (field, value) => {
            if (value === '' || value === null || value === undefined) return 0;
            if (field.type === 'number') return parseInt(value) || 0;
            if (field.type === 'grade') {
              const g = String(value).toUpperCase().trim();
              return g === 'A' ? 2 : g === 'B' ? 1 : g === 'C' ? 0 : g === 'D' ? -1 : g === 'F' ? -2 : 0;
            }
            if (field.type === 'count') return Math.min(parseInt(value) || 0, 2);
            if (field.type === 'feet') {
              const n = parseFloat(value);
              if (isNaN(n)) return 0;
              if (n < 40) return -2;
              if (n < 75) return 0;
              if (n < 90) return 1;
              return 2;
            }
            if (field.type === 'select') {
              const opt = field.options.find(o => o.value === value);
              return opt ? opt.score : 0;
            }
            return 0;
          };

          const [cabins, setCabins] = useState([]);
          const [expanded, setExpanded] = useState(new Set());
          const [editingName, setEditingName] = useState(null);
          const [editingNumber, setEditingNumber] = useState(null);
          const [editingPrice, setEditingPrice] = useState(null);
          const [editingUrl, setEditingUrl] = useState(null);
          const [meanDepth, setMeanDepth] = useState('');
          const [wsAcres, setWsAcres] = useState('');
          const [wsLittoralAcres, setWsLittoralAcres] = useState('');
          const [watershedAcres, setWatershedAcres] = useState('');
          const [showScoringGuide, setShowScoringGuide] = useState(false);
          const [savedLakes, setSavedLakes] = useState([]);
          const [watershedView, setWatershedView] = useState('saved');
          const [lakeName, setLakeName] = useState('');
          const [expandedLakes, setExpandedLakes] = useState(new Set());
          const [lakeSortBy, setLakeSortBy] = useState('score');
          const [editingLakeName, setEditingLakeName] = useState(null);
          const [editingLakeNotes, setEditingLakeNotes] = useState(null);
          const [health, setHealth] = useState('');
          const [tp, setTp] = useState('');
          const [appeal, setAppeal] = useState('');
          const [editingLakeDataId, setEditingLakeDataId] = useState(null);
          const [lakeEditDraft, setLakeEditDraft] = useState({});
          const [tsi, setTsi] = useState('');
          const [shorelineMiles, setShorelineMiles] = useState('');
          const [editingLakeUrl, setEditingLakeUrl] = useState(null);
          const [activeTab, setActiveTab] = useState(() => localStorage.getItem('activeTab') || 'lakes');

          const switchTab = (tab) => {
            setActiveTab(tab);
            localStorage.setItem('activeTab', tab);
          }; // { id, field }

          useEffect(() => {
            const saved = localStorage.getItem('cabinData');
            if (saved) {
              try {
                const data = JSON.parse(saved);
                if (data.cabins) {
                  const updated = data.cabins.map(cabin => ({
                    id: cabin.id,
                    name: cabin.name,
                    number: cabin.number || '',
                    price: cabin.price || '',
                    url: cabin.url || '',
                    inputs: cabin.inputs || {}
                  }));
                  setCabins(updated);
                }
              } catch (e) {}
            }
          }, []);

          useEffect(() => {
            if (cabins.length > 0) localStorage.setItem('cabinData', JSON.stringify({ cabins }));
          }, [cabins]);

          useEffect(() => {
            const saved = localStorage.getItem('savedLakes');
            if (saved) {
              try {
                setSavedLakes(JSON.parse(saved));
              } catch (e) {}
            }
          }, []);

          useEffect(() => {
            if (savedLakes.length > 0) localStorage.setItem('savedLakes', JSON.stringify(savedLakes));
          }, [savedLakes]);

          useEffect(() => {
            if (window.lucide) {
              window.lucide.createIcons();
            }
          }, [cabins, expanded, expandedLakes, lakeSortBy, watershedView, editingLakeName, editingLakeNotes]);

          const addCabin = () => {
            setCabins([{ 
              id: Date.now(), 
              name: 'Address', 
              number: '', 
              price: '',
              url: '',
              inputs: {}
            }, ...cabins]);
          };

          const removeCabin = (id) => {
            if (window.confirm('Delete this cabin?')) setCabins(cabins.filter(c => c.id !== id));
          };

          const updateName = (id, name) => setCabins(cabins.map(c => c.id === id ? { ...c, name } : c));
          const updateNumber = (id, number) => setCabins(cabins.map(c => c.id === id ? { ...c, number } : c));
          const updatePrice = (id, price) => setCabins(cabins.map(c => c.id === id ? { ...c, price } : c));
          const updateUrl = (id, url) => setCabins(cabins.map(c => c.id === id ? { ...c, url } : c));

          const updateInput = (cabinId, key, value) => {
            setCabins(cabins.map(c => c.id === cabinId ? { ...c, inputs: { ...c.inputs, [key]: value } } : c));
          };

          const calculateTotal = (cabin) => {
            const fieldTotal = fields.reduce((sum, field) => {
              const val = cabin.inputs ? (cabin.inputs[field.key] !== undefined ? cabin.inputs[field.key] : '') : '';
              return sum + scoreField(field, val) * field.weight;
            }, 0);
            const bonus = parseInt(cabin.inputs && cabin.inputs['bonus'] || 0) || 0;
            return fieldTotal + bonus;
          };

          const toggleExpanded = (id) => {
            const newExp = new Set(expanded);
            if (newExp.has(id)) newExp.delete(id); 
            else newExp.add(id);
            setExpanded(newExp);
          };

          const exportData = () => {
            const blob = new Blob([JSON.stringify({ cabins }, null, 2)], { type: 'application/json' });
            const url = URL.createObjectURL(blob);
            const link = document.createElement('a');
            link.href = url;
            link.download = 'lake-cabin-data.json';
            link.click();
            URL.revokeObjectURL(url);
          };

          const importData = (e) => {
            const file = e.target.files[0];
            if (file) {
              const reader = new FileReader();
              reader.onload = (ev) => {
                try {
                  const data = JSON.parse(ev.target.result);
                  if (data.cabins) {
                    const updated = data.cabins.map(cabin => ({
                      id: cabin.id,
                      name: cabin.name,
                      number: cabin.number || '',
                      price: cabin.price || '',
                      url: cabin.url || '',
                      inputs: cabin.inputs || {}
                    }));
                    setCabins(updated);
                    alert('Imported ' + updated.length + ' cabins');
                  }
                } catch (err) { 
                  alert('Error importing'); 
                }
              };
              reader.readAsText(file);
            }
          };

          const calculateWatershedRatio = () => {
            if (!wsAcres || !watershedAcres || wsAcres === '0') return null;
            return parseFloat(watershedAcres) / parseFloat(wsAcres);
          };

          const calculateLittoralPercentage = () => {
            if (!wsAcres || !wsLittoralAcres || wsAcres === '0') return null;
            return (parseFloat(wsLittoralAcres) / parseFloat(wsAcres)) * 100;
          };

          const scoreWatershedRatio = (ratio) => {
            if (ratio === null) return null;
            if (ratio < 5) return 2;
            if (ratio < 10) return 1;
            if (ratio < 15) return 0;
            if (ratio < 25) return -1;
            return -2;
          };

          const scoreHealth = (grade) => {
            if (!grade) return null;
            const g = grade.toUpperCase().trim();
            if (g === 'B+') return 2;
            if (g === 'B') return 1;
            if (g === 'B-') return 0;
            if (g === 'C+') return -1;
            if (g === 'C') return -2;
            return null;
          };

          const scoreTp = (tpValue) => {
            if (!tpValue) return null;
            const t = parseFloat(tpValue);
            if (t >= 5 && t <= 15) return 2;
            if (t > 15 && t <= 25) return 0;
            return -2;
          };

          const scoreAppeal = (grade) => {
            if (!grade) return null;
            const g = grade.toUpperCase().trim();
            if (g === 'A') return 2;
            if (g === 'B') return 1;
            if (g === 'C') return 0;
            if (g === 'D') return -1;
            if (g === 'F') return -2;
            return null;
          };

          const getTsiLabel = (tsiVal) => {
            if (!tsiVal) return null;
            const t = parseFloat(tsiVal);
            if (t >= 30 && t <= 39) return 'Oligotrophic';
            if (t >= 40 && t <= 49) return 'Mesotrophic';
            return null;
          };

          const watershedRatio = calculateWatershedRatio();
          const littoralPercentage = calculateLittoralPercentage();
          
          const watershedScore = scoreWatershedRatio(watershedRatio);
          const healthScore = scoreHealth(health);
          const tpScore = scoreTp(tp);
          const appealScore = scoreAppeal(appeal);

          const calculateWatershedAverage = () => {
            const scores = [watershedScore, healthScore, tpScore, appealScore].filter(s => s !== null);
            if (scores.length === 0) return null;
            const sum = scores.reduce((a, b) => a + b, 0);
            return sum;
          };

          const averageScore = calculateWatershedAverage();

          const getWatershedScoreColor = (score) => {
            if (score === null) return 'text-gray-400';
            if (score >= 2) return 'text-green-500';
            if (score >= 1) return 'text-green-400';
            if (score >= 0) return 'text-yellow-400';
            if (score >= -1) return 'text-red-400';
            return 'text-red-500';
          };

          const getLakeNameColor = (score) => {
            if (score >= 1) return 'text-green-600';
            if (score === 0) return 'text-yellow-600';
            return 'text-red-600';
          };

          const saveLake = () => {
            if (!lakeName.trim()) {
              alert('Please enter a lake name');
              return;
            }
            if (averageScore === null) {
              alert('Please enter lake data to calculate a score');
              return;
            }
            const newLake = {
              id: Date.now(),
              name: lakeName,
              acres: wsAcres,
              watershedAcres: watershedAcres,
              littoralAcres: wsLittoralAcres,
              health: health,
              tp: tp,
              meanDepth: meanDepth,
              appeal: appeal,
              tsi: tsi,
              shorelineMiles: shorelineMiles,
              dnrUrl: '',
              mapUrl: '',
              watershedRatio: watershedRatio,
              littoralPercentage: littoralPercentage,
              watershedScore: watershedScore,
              healthScore: healthScore,
              tpScore: tpScore,
              appealScore: appealScore,
              averageScore: averageScore,
              notes: ''
            };
            setSavedLakes([newLake, ...savedLakes]);
            setLakeName('');
            setWsAcres('');
            setWatershedAcres('');
            setHealth('');
            setTp('');
            setMeanDepth('');
            setAppeal('');
            setTsi('');
            setShorelineMiles('');
            alert('Lake saved!');
          };

          const deleteLake = (id) => {
            if (window.confirm('Delete this lake?')) {
              setSavedLakes(savedLakes.filter(l => l.id !== id));
            }
          };

          const updateLakeData = (id, draft) => {
            const newAcres = draft.acres;
            const newWatershedAcres = draft.watershedAcres;
            const newLittoralAcres = draft.littoralAcres;
            const newWatershedRatio = (newAcres && newWatershedAcres && newAcres !== '0')
              ? parseFloat(newWatershedAcres) / parseFloat(newAcres) : null;
            const newLittoralPct = (newAcres && newLittoralAcres && newAcres !== '0')
              ? (parseFloat(newLittoralAcres) / parseFloat(newAcres)) * 100 : null;
            const newWatershedScore = scoreWatershedRatio(newWatershedRatio);
            const newHealthScore = scoreHealth(draft.health);
            const newTpScore = scoreTp(draft.tp);
            const newAppealScore = scoreAppeal(draft.appeal);
            const allScores = [newWatershedScore, newHealthScore, newTpScore, newAppealScore].filter(s => s !== null);
            const newAvgScore = allScores.length ? allScores.reduce((a, b) => a + b, 0) : null;
            setSavedLakes(savedLakes.map(l => l.id === id ? {
              ...l,
              name: draft.name || l.name,
              health: draft.health,
              tp: draft.tp,
              acres: newAcres,
              watershedAcres: newWatershedAcres,
              littoralAcres: newLittoralAcres,
              meanDepth: draft.meanDepth,
              appeal: draft.appeal,
              tsi: draft.tsi,
              shorelineMiles: draft.shorelineMiles,
              watershedRatio: newWatershedRatio,
              littoralPercentage: newLittoralPct !== null ? newLittoralPct : l.littoralPercentage,
              watershedScore: newWatershedScore,
              healthScore: newHealthScore,
              tpScore: newTpScore,
              appealScore: newAppealScore,
              averageScore: newAvgScore,
            } : l));
            setEditingLakeDataId(null);
            setLakeEditDraft({});
          };

          const updateLakeName = (id, newName) => {
            setSavedLakes(savedLakes.map(l => l.id === id ? { ...l, name: newName } : l));
            setEditingLakeName(null);
          };

          const updateLakeNotes = (id, newNotes) => {
            setSavedLakes(savedLakes.map(l => l.id === id ? { ...l, notes: newNotes } : l));
            setEditingLakeNotes(null);
          };

          const updateLakeLink = (id, field, value) => {
            setSavedLakes(savedLakes.map(l => l.id === id ? { ...l, [field]: value } : l));
          };

          const toggleLakeExpanded = (id) => {
            const newExp = new Set(expandedLakes);
            if (newExp.has(id)) newExp.delete(id); 
            else newExp.add(id);
            setExpandedLakes(newExp);
          };

          const sortedLakes = (() => {
            const arr = [...savedLakes];
            if (lakeSortBy === 'acres') return arr.sort((a, b) => parseFloat(b.acres || 0) - parseFloat(a.acres || 0));
            if (lakeSortBy === 'health') return arr.sort((a, b) => (b.healthScore ?? -99) - (a.healthScore ?? -99));
            if (lakeSortBy === 'tsi') return arr.sort((a, b) => parseFloat(a.tsi || 999) - parseFloat(b.tsi || 999));
            if (lakeSortBy === 'tp') return arr.sort((a, b) => parseFloat(a.tp || 999) - parseFloat(b.tp || 999));
            if (lakeSortBy === 'shoreline') return arr.sort((a, b) => parseFloat(b.shorelineMiles || 0) - parseFloat(a.shorelineMiles || 0));
            return arr.sort((a, b) => b.averageScore - a.averageScore); // default: score
          })();

          const exportLakes = () => {
            const blob = new Blob([JSON.stringify(savedLakes, null, 2)], { type: 'application/json' });
            const url = URL.createObjectURL(blob);
            const link = document.createElement('a');
            link.href = url;
            link.download = 'saved-lakes-data.json';
            link.click();
            URL.revokeObjectURL(url);
          };

          const importLakes = (e) => {
            const file = e.target.files[0];
            if (file) {
              const reader = new FileReader();
              reader.onload = (ev) => {
                try {
                  const data = JSON.parse(ev.target.result);
                  if (Array.isArray(data)) {
                    setSavedLakes(data);
                    alert('Imported ' + data.length + ' lakes');
                  }
                } catch (err) { 
                  alert('Error importing lakes'); 
                }
              };
              reader.readAsText(file);
            }
          };

          return (
            <div className="min-h-screen bg-gradient-to-br from-slate-50 via-blue-50 to-teal-50 p-8">
              <div className="max-w-7xl mx-auto">
                <div className="text-center mb-6">
                  <h1 className="text-4xl font-black text-slate-800 mb-4">Cabin Scorer</h1>
                  <div className="inline-flex items-center bg-white rounded-full shadow-md border border-slate-200 p-1">
                    <button
                      onClick={() => switchTab('cabins')}
                      className={'px-6 py-2 rounded-full font-bold text-sm transition-all ' + (activeTab === 'cabins' ? 'bg-gradient-to-r from-teal-600 to-blue-600 text-white shadow' : 'text-slate-500 hover:text-slate-700')}
                    >
                      🏡 Cabins ({cabins.length})
                    </button>
                    <button
                      onClick={() => switchTab('lakes')}
                      className={'px-6 py-2 rounded-full font-bold text-sm transition-all ' + (activeTab === 'lakes' ? 'bg-gradient-to-r from-teal-600 to-blue-600 text-white shadow' : 'text-slate-500 hover:text-slate-700')}
                    >
                      🌊 Lakes ({savedLakes.length})
                    </button>
                  </div>
                </div>

                {activeTab === 'cabins' && (
                <div>

                <button onClick={addCabin} className="w-full mb-6 py-4 bg-gradient-to-r from-teal-600 to-blue-600 text-white rounded-xl hover:from-teal-700 hover:to-blue-700 shadow-lg flex items-center justify-center gap-3 text-lg font-bold">
                  <i data-lucide="plus" className="w-6 h-6"></i>
                  Add New Cabin
                </button>

                {cabins.length === 0 ? (
                  <div className="text-center py-16 bg-white/60 rounded-2xl border-2 border-dashed border-teal-300">
                    <div className="text-6xl mb-4">🏡</div>
                    <p className="text-xl text-slate-600">No cabins yet. Add your first cabin!</p>
                  </div>
                ) : (
                  <div className="mb-8 bg-gradient-to-br from-teal-600 to-blue-600 rounded-2xl shadow-2xl p-8 text-white">
                    <h2 className="text-xl mb-6 flex items-center gap-3">
                      <span className="text-4xl">🏡</span>
                      {maxScore} pts max + Lake Score
                    </h2>
                    <div className="grid gap-4">
                      {cabins.map((cabin) => {
                        const total = calculateTotal(cabin);
                        const isExpanded = expanded.has(cabin.id);
                        return (
                          <div key={cabin.id} className="bg-white/20 rounded-xl overflow-hidden">
                            <div className="p-6">
                              <div className="cursor-pointer" onClick={() => toggleExpanded(cabin.id)}>
                                <div className="mb-4">
                                  {editingName === cabin.id ? (
                                    <input 
                                      type="text" 
                                      value={cabin.name} 
                                      onChange={(e) => updateName(cabin.id, e.target.value)} 
                                      onBlur={() => setEditingName(null)} 
                                      onKeyDown={(e) => e.key === 'Enter' && setEditingName(null)} 
                                      autoFocus 
                                      onClick={(e) => e.stopPropagation()} 
                                      className="text-xl font-semibold text-slate-800 bg-white rounded-lg px-3 py-2 focus:outline-none focus:ring-2 focus:ring-teal-500 w-full mb-2" 
                                    />
                                  ) : (
                                    <div 
                                      className="text-xl font-semibold flex items-center gap-2 hover:text-teal-100 mb-2" 
                                      onClick={(e) => { e.stopPropagation(); setEditingName(cabin.id); }}
                                    >
                                      {cabin.name}
                                      <i data-lucide="edit-2" className="w-4 h-4 opacity-60"></i>
                                    </div>
                                  )}
                                  {editingUrl === cabin.id && (
                                    <div className="mb-2">
                                      <input 
                                        type="text" 
                                        value={cabin.url} 
                                        onChange={(e) => updateUrl(cabin.id, e.target.value)} 
                                        onBlur={() => setEditingUrl(null)} 
                                        onKeyDown={(e) => e.key === 'Enter' && setEditingUrl(null)} 
                                        placeholder="Paste Zillow URL here"
                                        autoFocus 
                                        onClick={(e) => e.stopPropagation()} 
                                        className="text-sm text-slate-800 bg-white rounded-lg px-3 py-2 focus:outline-none focus:ring-2 focus:ring-teal-500 w-full" 
                                      />
                                    </div>
                                  )}
                                  <div className="flex items-center justify-between gap-4">
                                    {editingNumber === cabin.id ? (
                                      <input 
                                        type="text" 
                                        value={cabin.number}

                                <div key={lake.id} className="bg-gray-200 rounded-xl shadow-lg overflow-hidden">
                                  <div className="px-4 py-3 bg-gray-200 cursor-pointer" onClick={() => toggleLakeExpanded(lake.id)}>
                                    <div className="flex justify-between items-center">
                                      <h3 className={'text-lg font-bold ' + getLakeNameColor(lake.watershedScore)}>
                                        {lake.name}
                                      </h3>
                                      <div className="flex items-center gap-3">
                                        <span className={'text-2xl font-black ' + (lake.averageScore > 0 ? 'text-green-500' : lake.averageScore < 0 ? 'text-red-500' : 'text-yellow-500')}>
                                          {lake.averageScore > 0 ? '+' : ''}{lake.averageScore}
                                        </span>
                                        <i data-lucide="chevron-down" className={'w-6 h-6 text-slate-600 transition-transform ' + (isExpanded ? 'rotate-180' : '')}></i>
                                      </div>
                                    </div>
                                  </div>

                                  {isExpanded && (
                                    <div className="px-4 pb-4 mt-2 bg-gray-200">
                                      <div className="bg-gradient-to-br from-slate-700 to-slate-900 rounded-xl p-6 text-white text-center mb-4">
                                        <div className="text-sm uppercase text-white/80 mb-2">Total Score</div>
                                        <div className={'text-5xl font-black ' + (lake.averageScore > 0 ? 'text-green-300' : lake.averageScore < 0 ? 'text-red-300' : 'text-yellow-300')}>
                                          {lake.averageScore > 0 ? '+' : ''}{lake.averageScore}
                                        </div>
                                      </div>

                                      <div className="pt-4 border-t border-slate-200">
                                        {editingLakeDataId === lake.id ? (
                                          <div>
                                            <h4 className="font-bold text-slate-700 mb-3">Edit Lake Data</h4>
                                            <div className="space-y-3 mb-4">
                                              {[
                                                { label: 'Lake Name', key: 'name', placeholder: 'Lake name', type: 'text' },
                                                { label: 'Health (Grade)', key: 'health', placeholder: 'C, C+, B-, B, B+', type: 'text' },
                                                { label: 'TP (Total Phosphorus)', key: 'tp', placeholder: '5-30', type: 'number' },
                                                { label: 'Lake Acres', key: 'acres', placeholder: 'Lake acres', type: 'number' },
                                                { label: 'Watershed Acres', key: 'watershedAcres', placeholder: 'Watershed acres', type: 'number' },
                                                { label: 'Littoral Acres', key: 'littoralAcres', placeholder: 'Littoral acres', type: 'number' },
                                                { label: 'Shoreline Miles', key: 'shorelineMiles', placeholder: 'Shoreline miles', type: 'number' },
                                                { label: 'Mean Depth (ft)', key: 'meanDepth', placeholder: 'Mean depth in feet', type: 'number' },
                                                { label: 'TSI (Trophic State Index)', key: 'tsi', placeholder: '30-49', type: 'number' },
                                                { label: 'Overall Appeal', key: 'appeal', placeholder: 'A, B, C, D, F', type: 'text' },
                                              ].map(({ label, key, placeholder, type }) => (
                                                <div key={key}>
                                                  <label className="block text-xs font-semibold text-slate-600 mb-1">{label}</label>
                                                  <input
                                                    type={type}
                                                    value={lakeEditDraft[key] || ''}
                                                    onChange={(e) => setLakeEditDraft({ ...lakeEditDraft, [key]: e.target.value })}
                                                    placeholder={placeholder}
                                                    className="w-full px-3 py-2 border-2 border-blue-400 rounded-lg text-sm focus:outline-none focus:border-blue-600"
                                                  />
                                                </div>
                                              ))}
                                            </div>
                                            <div className="flex gap-2">
                                              <button
                                                onClick={() => updateLakeData(lake.id, lakeEditDraft)}
                                                className="flex-1 py-2 bg-green-600 hover:bg-green-700 text-white rounded-lg font-bold text-sm"
                                              >
                                                Save Changes
                                              </button>
                                              <button
                                                onClick={() => { setEditingLakeDataId(null); setLakeEditDraft({}); }}
                                                className="flex-1 py-2 bg-slate-400 hover:bg-slate-500 text-white rounded-lg font-bold text-sm"
                                              >
                                                Cancel
                                              </button>
                                            </div>
                                          </div>
                                        ) : (
                                          <div>
                                            <div className="flex items-center justify-between mb-3">
                                              <h4 className="font-bold text-slate-700">Input Data</h4>
                                              <button
                                                onClick={(e) => { e.stopPropagation(); setEditingLakeDataId(lake.id); setLakeEditDraft({ name: lake.name || '', health: lake.health || '', tp: lake.tp || '', tsi: lake.tsi || '', shorelineMiles: lake.shorelineMiles || '', appeal: lake.appeal || '', acres: lake.acres || '', watershedAcres: lake.watershedAcres || '', littoralAcres: lake.littoralAcres || '', meanDepth: lake.meanDepth || '' }); }}
                                                className="text-xs px-3 py-1 bg-blue-100 hover:bg-blue-200 text-blue-700 rounded-lg font-semibold flex items-center gap-1"
                                              >
                                                <i data-lucide="edit-2" className="w-3 h-3"></i>
                                                Edit Data
                                              </button>
                                            </div>
                                            <div className="grid grid-cols-2 gap-4 mb-4">
                                              <div>
                                                <span className="text-sm text-slate-600">Lake Acres:</span>
                                                <span className="ml-2 font-semibold">{lake.acres}</span>
                                              </div>
                                              <div>
                                                <span className="text-sm text-slate-600">Watershed Acres:</span>
                                                <span className="ml-2 font-semibold">{lake.watershedAcres}</span>
                                              </div>
                                              <div>
                                                <span className="text-sm text-slate-600">Health:</span>
                                                <span className="ml-2 font-semibold">{lake.health || '---'}</span>
                                              </div>
                                              <div>
                                                <span className="text-sm text-slate-600">TP:</span>
                                                <span className="ml-2 font-semibold">{lake.tp || '---'}</span>
                                              </div>
                                              <div>
                                                <span className="text-sm text-slate-600">Mean Depth:</span>
                                                <span className="ml-2 font-semibold">{lake.meanDepth ? lake.meanDepth + ' ft' : '---'}</span>
                                              </div>
                                              <div>
                                                <span className="text-sm text-slate-600">Overall Appeal:</span>
                                                <span className="ml-2 font-semibold">{lake.appeal || '---'}</span>
                                              </div>
                                              <div className="col-span-2">
                                                <span className="text-sm text-slate-600">TSI:</span>
                                                <span className="ml-2 font-semibold">{lake.tsi || '---'}</span>
                                                {lake.tsi && getTsiLabel(lake.tsi) && (
                                                  <span className="ml-2 text-xs font-bold px-2 py-0.5 rounded-full bg-teal-100 text-teal-700">{getTsiLabel(lake.tsi)}</span>
                                                )}
                                              </div>
                                              <div>
                                                <span className="text-sm text-slate-600">Overall Appeal:</span>
                                                <span className="ml-2 font-semibold">{lake.appeal || '---'}</span>
                                              </div>
                                              <div>
                                                <span className="text-sm text-slate-600">Shoreline:</span>
                                                <span className="ml-2 font-semibold">{lake.shorelineMiles ? lake.shorelineMiles + ' mi' : '---'}</span>
                                              </div>
                                            </div>
                                          </div>
                                        )}

                                        <h4 className="font-bold text-slate-700 mb-3 mt-4">Calculated Values</h4>
                                        <div className="grid grid-cols-2 gap-4 mb-4">
                                          <div>
                                            <span className="text-sm text-slate-600">Watershed Ratio:</span>
                                            <span className="ml-2 font-semibold">{lake.watershedRatio !== null ? lake.watershedRatio.toFixed(1) + ':1' : '---'}</span>
                                          </div>
                                          <div>
                                            <span className="text-sm text-slate-600">Littoral %:</span>
                                            <span className="ml-2 font-semibold">{lake.littoralPercentage !== null ? lake.littoralPercentage.toFixed(1) + '%' : '---'}</span>
                                          </div>
                                        </div>

                                        <h4 className="font-bold text-slate-700 mb-3 mt-4">Individual Scores</h4>
                                        <div className="grid grid-cols-2 gap-3 mb-4">
                                          <div className="bg-slate-50 rounded-lg p-3 text-center">
                                            <div className="text-xs text-slate-600 mb-1">Watershed</div>
                                            <div className={'text-2xl font-black ' + (lake.watershedScore > 0 ? 'text-green-500' : lake.watershedScore < 0 ? 'text-red-500' : 'text-yellow-500')}>
                                              {lake.watershedScore > 0 ? '+' : ''}{lake.watershedScore}
                                            </div>
                                          </div>
                                          <div className="bg-slate-50 rounded-lg p-3 text-center">
                                            <div className="text-xs text-slate-600 mb-1">Health</div>
                                            <div className={'text-2xl font-black ' + ((lake.healthScore || 0) > 0 ? 'text-green-500' : (lake.healthScore || 0) < 0 ? 'text-red-500' : 'text-yellow-500')}>
                                              {lake.healthScore !== null && lake.healthScore !== undefined ? ((lake.healthScore > 0 ? '+' : '') + lake.healthScore) : '---'}
                                            </div>
                                          </div>
                                          <div className="bg-slate-50 rounded-lg p-3 text-center">
                                            <div className="text-xs text-slate-600 mb-1">TP</div>
                                            <div className={'text-2xl font-black ' + ((lake.tpScore || 0) > 0 ? 'text-green-500' : (lake.tpScore || 0) < 0 ? 'text-red-500' : 'text-yellow-500')}>
                                              {lake.tpScore !== null && lake.tpScore !== undefined ? ((lake.tpScore > 0 ? '+' : '') + lake.tpScore) : '---'}
                                            </div>
                                          </div>
                                          <div className="bg-slate-50 rounded-lg p-3 text-center">
                                            <div className="text-xs text-slate-600 mb-1">Overall Appeal</div>
                                            <div className={'text-2xl font-black ' + ((lake.appealScore || 0) > 0 ? 'text-green-500' : (lake.appealScore || 0) < 0 ? 'text-red-500' : 'text-yellow-500')}>
                                              {lake.appealScore !== null && lake.appealScore !== undefined ? ((lake.appealScore > 0 ? '+' : '') + lake.appealScore) : '---'}
                                            </div>
                                          </div>
                                        </div>

                                        <div className="mt-4">
                                          <h4 className="font-bold text-slate-700 mb-2">Notes</h4>
                                          {editingLakeNotes === lake.id ? (
                                            <input
                                              type="text"
                                              defaultValue={lake.notes || ''}
                                              onBlur={(e) => updateLakeNotes(lake.id, e.target.value)}
                                              onKeyDown={(e) => { if (e.key === 'Enter') updateLakeNotes(lake.id, e.target.value); }}
                                              autoFocus
                                              className="w-full px-3 py-2 border-2 border-blue-500 rounded-lg text-sm"
                                              placeholder="Add notes about this lake..."
                                            />
                                          ) : (
                                            <div
                                              onClick={() => setEditingLakeNotes(lake.id)}
                                              className="w-full px-3 py-2 bg-white rounded-lg text-sm text-slate-600 cursor-pointer hover:bg-slate-50 min-h-[40px] flex items-center"
                                            >
                                              {lake.notes || 'Click to add notes...'}
                                            </div>
                                          )}
                                        </div>

                                        <button
                                          onClick={(e) => { e.stopPropagation(); deleteLake(lake.id); }}
                                          className="w-full py-3 bg-red-500 hover:bg-red-600 text-white rounded-lg font-bold flex items-center justify-center gap-2 mt-4"
                                        >
                                          <i data-lucide="trash-2" className="w-4 h-4"></i>
                                          Delete Lake
                                        </button>

                                        <div className="mt-4 space-y-2">
                                          {[
                                            { label: 'DNR', field: 'dnrUrl' },
                                            { label: 'Map', field: 'mapUrl' },
                                          ].map(({ label, field }) => (
                                            <div key={field} className="flex items-center gap-2">
                                              <button
                                                onClick={(e) => { e.stopPropagation(); setEditingLakeUrl({ id: lake.id, field }); }}
                                                className="text-xs px-2 py-1 bg-slate-200 hover:bg-slate-300 text-slate-700 rounded font-semibold flex items-center"
                                              >
                                                <i data-lucide="link" className="w-3 h-3"></i>
                                              </button>
                                              {editingLakeUrl && editingLakeUrl.id === lake.id && editingLakeUrl.field === field ? (
                                                <input
                                                  type="url"
                                                  defaultValue={lake[field] || ''}
                                                  autoFocus
                                                  onClick={(e) => e.stopPropagation()}
                                                  onBlur={(e) => { updateLakeLink(lake.id, field, e.target.value); setEditingLakeUrl(null); }}
                                                  onKeyDown={(e) => { if (e.key === 'Enter') { updateLakeLink(lake.id, field, e.target.value); setEditingLakeUrl(null); } if (e.key === 'Escape') setEditingLakeUrl(null); }}
                                                  className="flex-1 px-2 py-1 border-2 border-blue-400 rounded text-sm focus:outline-none"
                                                  placeholder={'Paste ' + label + ' URL...'}
                                                />
                                              ) : lake[field] ? (
                                                <a
                                                  href={lake[field]}
                                                  target="_blank"
                                                  rel="noopener noreferrer"
                                                  onClick={(e) => e.stopPropagation()}
                                                  className="text-sm text-blue-600 hover:underline font-semibold"
                                                >
                                                  {label}
                                                </a>
                                              ) : (
                                                <span className="text-xs text-slate-400">No link set</span>
                                              )}
                                            </div>
                                          ))}
                                        </div>
                                      </div>
                                    </div>
                                  )}
                                </div>
                            );
                          })}
                        </div>
                        </>
                      )}
                    </div>
                  )}
                </div>
                </div>
                )}

              </div>
            </div>
          );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<CabinScorer />);
        
        setTimeout(() => { lucide.createIcons(); }, 100);
    </script>
</body>
</html>
