<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lake Cabin</title>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Merriweather:wght@700;900&family=Lato:wght@400;700&display=swap" rel="stylesheet">
    <style>
        * { font-family: 'Lato', sans-serif; }
        h1, h2, h3 { font-family: 'Merriweather', serif; }
    </style>
    <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.js"></script>
</head>
<body>
    <div id="root"></div>
    
    <script type="text/babel">
        const { useState, useEffect } = React;

        function CabinScorer() {
          const criteria = [
            "Lake Score", "Distance from Home", "Resort on Lake", "Frontage", "Beach", "Lake Bottom",
            "Swimming Depth", "Dock Condition", "Dock/Lift Included", "Backyard Slope",
            "Cabin Condition", "Bedrooms", "Bathrooms", "Kitchen", "Living Area", "Loft",
            "Fireplace", "Seasonal/Year Round", "Washer and Dryer", "Garage", "Outdoor Storage", "Backlot", "Lot size",
            "Lot side of Lake", "Included Furnishings/Toys"
          ];

          const weights = {
            "Distance from Home": 2, "Lake Score": 2, "Beach": 2, "Swimming Depth": 2,
            "Cabin Condition": 2, "Garage": 2, "Backlot": 2
          };

          const guidelines = {
            "Distance from Home": "60 Mins +1, Under 60 Mins +2", "Lake Score": "Enter sum from calculator",
            "Resort on Lake": "No Resort +2, Resort -2",
            "Frontage": "50' = 0, 75' = +1, 100' = +2", "Beach": "Sand +2", "Lake Bottom": "Hard +2",
            "Swimming Depth": "3' at Dock +1, Deeper +2", "Dock/Lift Included": " Dock +1, Lift +2", 
            "Backyard Slope": "Moderate +1, Gentle +2",
            "Cabin Condition": "Needs Little, +1, Needs Nothing +2", "Bedrooms": "Two +1",
            "Bathrooms": "One +1", "Kitchen": "Overall Condition", "Living Area": "Overall Condition", "Loft": "+2 if Yes, 0 if No",
            "Fireplace": "+2 if Yes, 0 if No", "Seasonal/Year Round": "Seasonal 0, Year Round +2",
            "Washer and Dryer": "+2 if Yes, 0 if No",
            "Garage": "Number of Stalls", "Outdoor Storage": "Number of Sheds", "Backlot": "+2 if Yes, 0 if No", 
            "Lot side of Lake": "South +0, North/West +1, East +2"
          };

          const [cabins, setCabins] = useState([]);
          const [expanded, setExpanded] = useState(new Set());
          const [editingName, setEditingName] = useState(null);
          const [editingNumber, setEditingNumber] = useState(null);
          const [editingPrice, setEditingPrice] = useState(null);
          const [editingUrl, setEditingUrl] = useState(null);
          const [meanDepth, setMeanDepth] = useState('');
          const [wsAcres, setWsAcres] = useState('');
          const [wsLittoralAcres, setWsLittoralAcres] = useState('');
          const [watershedAcres, setWatershedAcres] = useState('');
          const [showScoringGuide, setShowScoringGuide] = useState(false);
          const [savedLakes, setSavedLakes] = useState([]);
          const [watershedView, setWatershedView] = useState('saved');
          const [lakeName, setLakeName] = useState('');
          const [expandedLakes, setExpandedLakes] = useState(new Set());
          const [lakeSortBy, setLakeSortBy] = useState('score');
          const [editingLakeName, setEditingLakeName] = useState(null);
          const [editingLakeNotes, setEditingLakeNotes] = useState(null);
          const [health, setHealth] = useState('');
          const [tp, setTp] = useState('');
          const [appeal, setAppeal] = useState('');
          const [editingLakeDataId, setEditingLakeDataId] = useState(null);
          const [lakeEditDraft, setLakeEditDraft] = useState({});
          const [tsi, setTsi] = useState('');

          useEffect(() => {
            const saved = localStorage.getItem('cabinData');
            if (saved) {
              try {
                const data = JSON.parse(saved);
                if (data.cabins) {
                  const updated = data.cabins.map(cabin => {
                    const scores = {};
                    criteria.forEach(c => { 
                      scores[c] = cabin.scores && cabin.scores[c] !== undefined ? cabin.scores[c] : 0; 
                    });
                    return { 
                      id: cabin.id, 
                      name: cabin.name, 
                      number: cabin.number || '', 
                      price: cabin.price || '',
                      url: cabin.url || '',
                      scores: scores 
                    };
                  });
                  setCabins(updated);
                }
              } catch (e) {}
            }
          }, []);

          useEffect(() => {
            if (cabins.length > 0) localStorage.setItem('cabinData', JSON.stringify({ cabins }));
          }, [cabins]);

          useEffect(() => {
            const saved = localStorage.getItem('savedLakes');
            if (saved) {
              try {
                setSavedLakes(JSON.parse(saved));
              } catch (e) {}
            }
          }, []);

          useEffect(() => {
            if (savedLakes.length > 0) localStorage.setItem('savedLakes', JSON.stringify(savedLakes));
          }, [savedLakes]);

          useEffect(() => {
            if (window.lucide) {
              window.lucide.createIcons();
            }
          }, [cabins, expanded, expandedLakes, lakeSortBy, watershedView, editingLakeName, editingLakeNotes]);

          const addCabin = () => {
            const scores = {};
            criteria.forEach(c => { scores[c] = 0; });
            setCabins([{ 
              id: Date.now(), 
              name: 'Address', 
              number: '', 
              price: '',
              url: '',
              scores 
            }, ...cabins]);
          };

          const removeCabin = (id) => {
            if (window.confirm('Delete this cabin?')) setCabins(cabins.filter(c => c.id !== id));
          };

          const updateName = (id, name) => setCabins(cabins.map(c => c.id === id ? { ...c, name } : c));
          const updateNumber = (id, number) => setCabins(cabins.map(c => c.id === id ? { ...c, number } : c));
          const updatePrice = (id, price) => setCabins(cabins.map(c => c.id === id ? { ...c, price } : c));
          const updateUrl = (id, url) => setCabins(cabins.map(c => c.id === id ? { ...c, url } : c));

          const updateScore = (cabinId, criterion, score) => {
            setCabins(cabins.map(c => c.id === cabinId ? { ...c, scores: { ...c.scores, [criterion]: score } } : c));
          };

          const calculateTotal = (cabin) => {
            let total = 0;
            for (const c in cabin.scores) {
              total += cabin.scores[c] * (weights[c] || 1);
            }
            return total;
          };

          const getScoreColor = (score) => {
            const map = { 
              '-2': 'bg-red-500 hover:bg-red-600', 
              '-1': 'bg-red-300 hover:bg-red-400', 
              '0': 'bg-yellow-400 hover:bg-yellow-500', 
              '1': 'bg-green-300 hover:bg-green-400', 
              '2': 'bg-green-500 hover:bg-green-600' 
            };
            return map[score] || 'bg-yellow-400 hover:bg-yellow-500';
          };

          const toggleExpanded = (id) => {
            const newExp = new Set(expanded);
            if (newExp.has(id)) newExp.delete(id); 
            else newExp.add(id);
            setExpanded(newExp);
          };

          const exportData = () => {
            const blob = new Blob([JSON.stringify({ cabins }, null, 2)], { type: 'application/json' });
            const url = URL.createObjectURL(blob);
            const link = document.createElement('a');
            link.href = url;
            link.download = 'lake-cabin-data.json';
            link.click();
            URL.revokeObjectURL(url);
          };

          const importData = (e) => {
            const file = e.target.files[0];
            if (file) {
              const reader = new FileReader();
              reader.onload = (ev) => {
                try {
                  const data = JSON.parse(ev.target.result);
                  if (data.cabins) {
                    const updated = data.cabins.map(cabin => {
                      const scores = {};
                      criteria.forEach(c => { 
                        scores[c] = cabin.scores && cabin.scores[c] !== undefined ? cabin.scores[c] : 0; 
                      });
                      return { 
                        id: cabin.id, 
                        name: cabin.name, 
                        number: cabin.number || '', 
                        price: cabin.price || '',
                        url: cabin.url || '',
                        scores 
                      };
                    });
                    setCabins(updated);
                    alert('Imported ' + updated.length + ' cabins');
                  }
                } catch (err) { 
                  alert('Error importing'); 
                }
              };
              reader.readAsText(file);
            }
          };

          const calculateWatershedRatio = () => {
            if (!wsAcres || !watershedAcres || wsAcres === '0') return null;
            return parseFloat(watershedAcres) / parseFloat(wsAcres);
          };

          const calculateLittoralPercentage = () => {
            if (!wsAcres || !wsLittoralAcres || wsAcres === '0') return null;
            return (parseFloat(wsLittoralAcres) / parseFloat(wsAcres)) * 100;
          };

          const scoreWatershedRatio = (ratio) => {
            if (ratio === null) return null;
            if (ratio < 5) return 2;
            if (ratio < 10) return 1;
            if (ratio < 15) return 0;
            if (ratio < 25) return -1;
            return -2;
          };

          const scoreHealth = (grade) => {
            if (!grade) return null;
            const g = grade.toUpperCase().trim();
            if (g === 'B+') return 2;
            if (g === 'B') return 1;
            if (g === 'B-') return 0;
            if (g === 'C+') return -1;
            if (g === 'C') return -2;
            return null;
          };

          const scoreTp = (tpValue) => {
            if (!tpValue) return null;
            const t = parseFloat(tpValue);
            if (t >= 5 && t <= 15) return 2;
            if (t > 15 && t <= 25) return 0;
            return -2;
          };

          const scoreAppeal = (grade) => {
            if (!grade) return null;
            const g = grade.toUpperCase().trim();
            if (g === 'A') return 2;
            if (g === 'B') return 1;
            if (g === 'C') return 0;
            if (g === 'D') return -1;
            if (g === 'F') return -2;
            return null;
          };

          const getTsiLabel = (tsiVal) => {
            if (!tsiVal) return null;
            const t = parseFloat(tsiVal);
            if (t >= 30 && t <= 39) return 'Oligotrophic';
            if (t >= 40 && t <= 49) return 'Mesotrophic';
            return null;
          };

          const watershedRatio = calculateWatershedRatio();
          const littoralPercentage = calculateLittoralPercentage();
          
          const watershedScore = scoreWatershedRatio(watershedRatio);
          const healthScore = scoreHealth(health);
          const tpScore = scoreTp(tp);
          const appealScore = scoreAppeal(appeal);

          const calculateWatershedAverage = () => {
            const scores = [watershedScore, healthScore, tpScore, appealScore].filter(s => s !== null);
            if (scores.length === 0) return null;
            const sum = scores.reduce((a, b) => a + b, 0);
            return sum;
          };

          const averageScore = calculateWatershedAverage();

          const getWatershedScoreColor = (score) => {
            if (score === null) return 'text-gray-400';
            if (score >= 2) return 'text-green-500';
            if (score >= 1) return 'text-green-400';
            if (score >= 0) return 'text-yellow-400';
            if (score >= -1) return 'text-red-400';
            return 'text-red-500';
          };

          const getLakeNameColor = (score) => {
            if (score >= 1) return 'text-green-600';
            if (score === 0) return 'text-yellow-600';
            return 'text-red-600';
          };

          const saveLake = () => {
            if (!lakeName.trim()) {
              alert('Please enter a lake name');
              return;
            }
            if (averageScore === null) {
              alert('Please enter lake data to calculate a score');
              return;
            }
            const newLake = {
              id: Date.now(),
              name: lakeName,
              acres: wsAcres,
              watershedAcres: watershedAcres,
              littoralAcres: wsLittoralAcres,
              health: health,
              tp: tp,
              meanDepth: meanDepth,
              appeal: appeal,
              tsi: tsi,
              watershedRatio: watershedRatio,
              littoralPercentage: littoralPercentage,
              watershedScore: watershedScore,
              healthScore: healthScore,
              tpScore: tpScore,
              appealScore: appealScore,
              averageScore: averageScore,
              notes: ''
            };
            setSavedLakes([newLake, ...savedLakes]);
            setLakeName('');
            setWsAcres('');
            setWatershedAcres('');
            setHealth('');
            setTp('');
            setMeanDepth('');
            setAppeal('');
            setTsi('');
            alert('Lake saved!');
          };

          const deleteLake = (id) => {
            if (window.confirm('Delete this lake?')) {
              setSavedLakes(savedLakes.filter(l => l.id !== id));
            }
          };

          const updateLakeData = (id, draft) => {
            const newAcres = draft.acres;
            const newWatershedAcres = draft.watershedAcres;
            const newLittoralAcres = draft.littoralAcres;
            const newWatershedRatio = (newAcres && newWatershedAcres && newAcres !== '0')
              ? parseFloat(newWatershedAcres) / parseFloat(newAcres) : null;
            const newLittoralPct = (newAcres && newLittoralAcres && newAcres !== '0')
              ? (parseFloat(newLittoralAcres) / parseFloat(newAcres)) * 100 : null;
            const newWatershedScore = scoreWatershedRatio(newWatershedRatio);
            const newHealthScore = scoreHealth(draft.health);
            const newTpScore = scoreTp(draft.tp);
            const newAppealScore = scoreAppeal(draft.appeal);
            const allScores = [newWatershedScore, newHealthScore, newTpScore, newAppealScore].filter(s => s !== null);
            const newAvgScore = allScores.length ? allScores.reduce((a, b) => a + b, 0) : null;
            setSavedLakes(savedLakes.map(l => l.id === id ? {
              ...l,
              health: draft.health,
              tp: draft.tp,
              acres: newAcres,
              watershedAcres: newWatershedAcres,
              littoralAcres: newLittoralAcres,
              meanDepth: draft.meanDepth,
              appeal: draft.appeal,
              tsi: draft.tsi,
              watershedRatio: newWatershedRatio,
              littoralPercentage: newLittoralPct !== null ? newLittoralPct : l.littoralPercentage,
              watershedScore: newWatershedScore,
              healthScore: newHealthScore,
              tpScore: newTpScore,
              appealScore: newAppealScore,
              averageScore: newAvgScore,
            } : l));
            setEditingLakeDataId(null);
            setLakeEditDraft({});
          };

          const updateLakeName = (id, newName) => {
            setSavedLakes(savedLakes.map(l => l.id === id ? { ...l, name: newName } : l));
            setEditingLakeName(null);
          };

          const updateLakeNotes = (id, newNotes) => {
            setSavedLakes(savedLakes.map(l => l.id === id ? { ...l, notes: newNotes } : l));
            setEditingLakeNotes(null);
          };

          const toggleLakeExpanded = (id) => {
            const newExp = new Set(expandedLakes);
            if (newExp.has(id)) newExp.delete(id); 
            else newExp.add(id);
            setExpandedLakes(newExp);
          };

          const sortedLakes = lakeSortBy === 'alpha' 
            ? [...savedLakes].sort((a, b) => a.name.localeCompare(b.name))
            : [...savedLakes].sort((a, b) => b.averageScore - a.averageScore);

          const exportLakes = () => {
            const blob = new Blob([JSON.stringify(savedLakes, null, 2)], { type: 'application/json' });
            const url = URL.createObjectURL(blob);
            const link = document.createElement('a');
            link.href = url;
            link.download = 'saved-lakes-data.json';
            link.click();
            URL.revokeObjectURL(url);
          };

          const importLakes = (e) => {
            const file = e.target.files[0];
            if (file) {
              const reader = new FileReader();
              reader.onload = (ev) => {
                try {
                  const data = JSON.parse(ev.target.result);
                  if (Array.isArray(data)) {
                    setSavedLakes(data);
                    alert('Imported ' + data.length + ' lakes');
                  }
                } catch (err) { 
                  alert('Error importing lakes'); 
                }
              };
              reader.readAsText(file);
            }
          };

          return (
            <div className="min-h-screen bg-gradient-to-br from-slate-50 via-blue-50 to-teal-50 p-8">
              <div className="max-w-7xl mx-auto">
                <div className="text-center mb-6">
                  <h1 className="text-4xl font-black text-slate-800">Cabin Scorer</h1>
                </div>

                <button onClick={addCabin} className="w-full mb-6 py-4 bg-gradient-to-r from-teal-600 to-blue-600 text-white rounded-xl hover:from-teal-700 hover:to-blue-700 shadow-lg flex items-center justify-center gap-3 text-lg font-bold">
                  <i data-lucide="plus" className="w-6 h-6"></i>
                  Add New Cabin
                </button>

                {cabins.length === 0 ? (
                  <div className="text-center py-16 bg-white/60 rounded-2xl border-2 border-dashed border-teal-300">
                    <div className="text-6xl mb-4">🏡</div>
                    <p className="text-xl text-slate-600">No cabins yet. Add your first cabin!</p>
                  </div>
                ) : (
                  <div className="mb-8 bg-gradient-to-br from-teal-600 to-blue-600 rounded-2xl shadow-2xl p-8 text-white">
                    <h2 className="text-xl mb-6 flex items-center gap-3">
                      <span className="text-4xl">🏡</span>
                      76 Points Max Score 
                    </h2>
                    <div className="grid gap-4">
                      {cabins.map((cabin) => {
                        const total = calculateTotal(cabin);
                        const isExpanded = expanded.has(cabin.id);
                        return (
                          <div key={cabin.id} className="bg-white/20 rounded-xl overflow-hidden">
                            <div className="p-6">
                              <div className="cursor-pointer" onClick={() => toggleExpanded(cabin.id)}>
                                <div className="mb-4">
                                  {editingName === cabin.id ? (
                                    <input 
                                      type="text" 
                                      value={cabin.name} 
                                      onChange={(e) => updateName(cabin.id, e.target.value)} 
                                      onBlur={() => setEditingName(null)} 
                                      onKeyDown={(e) => e.key === 'Enter' && setEditingName(null)} 
                                      autoFocus 
                                      onClick={(e) => e.stopPropagation()} 
                                      className="text-xl font-semibold text-slate-800 bg-white rounded-lg px-3 py-2 focus:outline-none focus:ring-2 focus:ring-teal-500 w-full mb-2" 
                                    />
                                  ) : (
                                    <div 
                                      className="text-xl font-semibold flex items-center gap-2 hover:text-teal-100 mb-2" 
                                      onClick={(e) => { e.stopPropagation(); setEditingName(cabin.id); }}
                                    >
                                      {cabin.name}
                                      <i data-lucide="edit-2" className="w-4 h-4 opacity-60"></i>
                                    </div>
                                  )}
                                  {editingUrl === cabin.id && (
                                    <div className="mb-2">
                                      <input 
                                        type="text" 
                                        value={cabin.url} 
                                        onChange={(e) => updateUrl(cabin.id, e.target.value)} 
                                        onBlur={() => setEditingUrl(null)} 
                                        onKeyDown={(e) => e.key === 'Enter' && setEditingUrl(null)} 
                                        placeholder="Paste Zillow URL here"
                                        autoFocus 
                                        onClick={(e) => e.stopPropagation()} 
                                        className="text-sm text-slate-800 bg-white rounded-lg px-3 py-2 focus:outline-none focus:ring-2 focus:ring-teal-500 w-full" 
                                      />
                                    </div>
                                  )}
                                  <div className="flex items-center justify-between gap-4">
                                    {editingNumber === cabin.id ? (
                                      <input 
                                        type="text" 
                                        value={cabin.number} 
                                        onChange={(e) => updateNumber(cabin.id, e.target.value)} 
                                        onBlur={() => setEditingNumber(null)} 
                                        onKeyDown={(e) => e.key === 'Enter' && setEditingNumber(null)} 
                                        autoFocus 
                                        onClick={(e) => e.stopPropagation()} 
                                        className="text-xl font-semibold text-slate-800 bg-white rounded-lg px-3 py-2 focus:outline-none focus:ring-2 focus:ring-teal-500 flex-1" 
                                      />
                                    ) : (
                                      <div 
                                        className="text-xl font-semibold flex items-center gap-2 hover:text-teal-100 flex-1" 
                                        onClick={(e) => { e.stopPropagation(); setEditingNumber(cabin.id); }}
                                      >
                                        {cabin.number || 'Lake'}
                                        <i data-lucide="edit-2" className="w-4 h-4 opacity-60"></i>
                                      </div>
                                    )}
                                    {editingPrice === cabin.id ? (
                                      <input 
                                        type="text" 
                                        value={cabin.price} 
                                        onChange={(e) => updatePrice(cabin.id, e.target.value)} 
                                        onBlur={() => setEditingPrice(null)} 
                                        onKeyDown={(e) => e.key === 'Enter' && setEditingPrice(null)} 
                                        autoFocus 
                                        onClick={(e) => e.stopPropagation()} 
                                        className="text-xl font-semibold text-slate-800 bg-white rounded-lg px-3 py-2 focus:outline-none focus:ring-2 focus:ring-teal-500" 
                                        style={{width: '120px'}}
                                      />
                                    ) : (
                                      <div 
                                        className="text-xl font-semibold flex items-center gap-2 hover:text-teal-100" 
                                        onClick={(e) => { e.stopPropagation(); setEditingPrice(cabin.id); }}
                                      >
                                        {cabin.price ? '$' + cabin.price + 'K' : '$___K'}
                                        <i data-lucide="edit-2" className="w-4 h-4 opacity-60"></i>
                                      </div>
                                    )}
                                  </div>
                                </div>
                                <div className="flex items-center justify-between mb-6">
                                  <div className="flex gap-2">
                                    {cabin.url ? (
                                      <a 
                                        href={cabin.url} 
                                        target="_blank" 
                                        rel="noopener noreferrer"
                                        onClick={(e) => e.stopPropagation()}
                                        className="bg-white/20 hover:bg-white/30 p-2 rounded-lg transition-colors"
                                      >
                                        <i data-lucide="external-link" className="w-5 h-5"></i>
                                      </a>
                                    ) : null}
                                    <button
                                      onClick={(e) => { e.stopPropagation(); setEditingUrl(cabin.id); }}
                                      className="bg-white/20 hover:bg-white/30 p-2 rounded-lg transition-colors"
                                    >
                                      <i data-lucide="link" className="w-5 h-5"></i>
                                    </button>
                                  </div>
                                  <div className="text-right">
                                    <div className="text-sm uppercase text-white/80 mb-2">Total</div>
                                    <div className={'text-5xl font-black ' + (total > 0 ? 'text-green-300' : total < 0 ? 'text-red-300' : 'text-yellow-300')}>
                                      {total > 0 ? '+' : ''}{total}
                                    </div>
                                  </div>
                                </div>
                                <div className="flex items-center justify-between">
                                  <button 
                                    onClick={(e) => { e.stopPropagation(); removeCabin(cabin.id); }} 
                                    className="px-3 py-1 bg-red-500/80 hover:bg-red-600 text-white rounded text-sm"
                                  >
                                    <i data-lucide="trash-2" className="w-3 h-3 inline mr-1"></i>
                                    Remove
                                  </button>
                                  <i data-lucide="chevron-down" className={'w-8 h-8 text-white transition-transform ' + (isExpanded ? 'rotate-180' : '')}></i>
                                </div>
                              </div>
                            </div>

                            {isExpanded && (
                              <div className="px-6 pb-6 border-t border-white/20 pt-6">
                                <div className="space-y-3">
                                  {criteria.map((criterion, idx) => {
                                    const weight = weights[criterion] || 1;
                                    const rawScore = cabin.scores[criterion] || 0;
                                    const weighted = rawScore * weight;
                                    return (
                                      <div key={idx} className="bg-white/10 rounded-xl p-4">
                                        <div className="flex items-center justify-between mb-2">
                                          <div className="flex-1">
                                            <span className="font-semibold text-white">
                                              {criterion}

                                          <div className="bg-slate-50 rounded-lg p-3 text-center">
                                            <div className="text-xs text-slate-600 mb-1">Health</div>
                                            <div className={'text-2xl font-black ' + ((lake.healthScore || 0) > 0 ? 'text-green-500' : (lake.healthScore || 0) < 0 ? 'text-red-500' : 'text-yellow-500')}>
                                              {lake.healthScore !== null && lake.healthScore !== undefined ? ((lake.healthScore > 0 ? '+' : '') + lake.healthScore) : '---'}
                                            </div>
                                          </div>
                                          <div className="bg-slate-50 rounded-lg p-3 text-center">
                                            <div className="text-xs text-slate-600 mb-1">TP</div>
                                            <div className={'text-2xl font-black ' + ((lake.tpScore || 0) > 0 ? 'text-green-500' : (lake.tpScore || 0) < 0 ? 'text-red-500' : 'text-yellow-500')}>
                                              {lake.tpScore !== null && lake.tpScore !== undefined ? ((lake.tpScore > 0 ? '+' : '') + lake.tpScore) : '---'}
                                            </div>
                                          </div>
                                          <div className="bg-slate-50 rounded-lg p-3 text-center">
                                            <div className="text-xs text-slate-600 mb-1">Overall Appeal</div>
                                            <div className={'text-2xl font-black ' + ((lake.appealScore || 0) > 0 ? 'text-green-500' : (lake.appealScore || 0) < 0 ? 'text-red-500' : 'text-yellow-500')}>
                                              {lake.appealScore !== null && lake.appealScore !== undefined ? ((lake.appealScore > 0 ? '+' : '') + lake.appealScore) : '---'}
                                            </div>
                                          </div>
                                        </div>

                                        <div className="mt-4">
                                          <h4 className="font-bold text-slate-700 mb-2">Notes</h4>
                                          {editingLakeNotes === lake.id ? (
                                            <input
                                              type="text"
                                              defaultValue={lake.notes || ''}
                                              onBlur={(e) => updateLakeNotes(lake.id, e.target.value)}
                                              onKeyDown={(e) => { if (e.key === 'Enter') updateLakeNotes(lake.id, e.target.value); }}
                                              autoFocus
                                              className="w-full px-3 py-2 border-2 border-blue-500 rounded-lg text-sm"
                                              placeholder="Add notes about this lake..."
                                            />
                                          ) : (
                                            <div
                                              onClick={() => setEditingLakeNotes(lake.id)}
                                              className="w-full px-3 py-2 bg-white rounded-lg text-sm text-slate-600 cursor-pointer hover:bg-slate-50 min-h-[40px] flex items-center"
                                            >
                                              {lake.notes || 'Click to add notes...'}
                                            </div>
                                          )}
                                        </div>

                                        <button
                                          onClick={(e) => { e.stopPropagation(); deleteLake(lake.id); }}
                                          className="w-full py-3 bg-red-500 hover:bg-red-600 text-white rounded-lg font-bold flex items-center justify-center gap-2 mt-4"
                                        >
                                          <i data-lucide="trash-2" className="w-4 h-4"></i>
                                          Delete Lake
                                        </button>
                                      </div>
                                    </div>
                                  )}
                                </div>
                              </div>
                            );
                          })}
                        </div>
                        </>
                      )}
                    </div>
                  )}
                </div>

              </div>
            </div>
          );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<CabinScorer />);
        
        setTimeout(() => { lucide.createIcons(); }, 100);
    </script>
</body>
</html>
